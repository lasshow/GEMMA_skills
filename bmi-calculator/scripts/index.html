<!doctype html>
<html lang="es">
<head><meta charset="UTF-8" /><title>BMI Calculator</title></head>
<body>
<script>
  window['ai_edge_gallery_get_result'] = async (data) => {
    try {
      const jsonData = JSON.parse(data);
      const weight = parseFloat(jsonData.weight) || 0;
      const heightCm = parseFloat(jsonData.height) || 0;

      if (weight <= 0 || heightCm <= 0) {
        return JSON.stringify({ error: 'Proporciona peso (kg) y altura (cm) validos.' });
      }

      const heightM = heightCm / 100;
      const bmi = weight / (heightM * heightM);

      let category = '';
      if (bmi < 18.5) category = 'Bajo peso';
      else if (bmi < 25) category = 'Peso normal';
      else if (bmi < 30) category = 'Sobrepeso';
      else if (bmi < 35) category = 'Obesidad grado I';
      else if (bmi < 40) category = 'Obesidad grado II';
      else category = 'Obesidad grado III';

      const healthyMin = (18.5 * heightM * heightM).toFixed(1);
      const healthyMax = (24.9 * heightM * heightM).toFixed(1);

      let result = `=== INDICE DE MASA CORPORAL ===\n\n`;
      result += `Peso: ${weight} kg\n`;
      result += `Altura: ${heightCm} cm\n`;
      result += `IMC: ${bmi.toFixed(1)}\n`;
      result += `Clasificacion: ${category}\n\n`;
      result += `Rango saludable para tu altura: ${healthyMin} - ${healthyMax} kg\n\n`;
      result += `AVISO: El IMC es una referencia general. Consulta a un profesional de salud para una evaluacion completa.`;

      return JSON.stringify({ result });
    } catch (e) {
      return JSON.stringify({ error: `Error: ${e.message}` });
    }
  };
</script>
</body>
</html>

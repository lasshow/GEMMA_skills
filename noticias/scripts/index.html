<!doctype html>
<html lang="es">
<head><meta charset="UTF-8" /><title>Noticias</title></head>
<body>
<script>
  /**
   * Obtiene noticias de Google News RSS via rss2json.com
   * rss2json.com tiene CORS nativo: Access-Control-Allow-Origin: *
   */
  window['ai_edge_gallery_get_result'] = async (data) => {
    try {
      const jsonData = JSON.parse(data);
      const topic = jsonData.topic || '';
      const lang = jsonData.lang || 'es';
      const country = jsonData.country || 'ES';

      // Construir URL de Google News RSS
      let rssUrl;
      if (topic) {
        rssUrl = `https://news.google.com/rss/search?q=${encodeURIComponent(topic)}&hl=${lang}&gl=${country}&ceid=${country}:${lang}`;
      } else {
        rssUrl = `https://news.google.com/rss?hl=${lang}&gl=${country}&ceid=${country}:${lang}`;
      }

      // Usar rss2json.com como proxy con CORS
      const apiUrl = `https://api.rss2json.com/v1/api.json?rss_url=${encodeURIComponent(rssUrl)}`;
      const res = await fetch(apiUrl);
      if (!res.ok) throw new Error(`HTTP ${res.status}`);
      const feed = await res.json();

      if (feed.status !== 'ok' || !feed.items || feed.items.length === 0) {
        return JSON.stringify({ result: `No se encontraron noticias${topic ? ` sobre "${topic}"` : ''}.` });
      }

      let output = '';
      if (topic) {
        output += `=== NOTICIAS: ${topic.toUpperCase()} ===\n\n`;
      } else {
        output += `=== NOTICIAS PRINCIPALES ===\n\n`;
      }

      const items = feed.items.slice(0, 8);
      for (let i = 0; i < items.length; i++) {
        const item = items[i];
        const date = item.pubDate ? new Date(item.pubDate).toLocaleDateString(lang, {
          day: 'numeric', month: 'short', year: 'numeric', hour: '2-digit', minute: '2-digit'
        }) : '';
        output += `[${i+1}] ${item.title}\n`;
        if (item.author) output += `    Fuente: ${item.author}\n`;
        if (date) output += `    Fecha: ${date}\n`;
        output += `    ${item.link}\n\n`;
      }

      if (output.length > 4000) output = output.substring(0, 4000) + '\n[TRUNCADO]';
      return JSON.stringify({ result: output });
    } catch (e) {
      return JSON.stringify({ error: `Error al obtener noticias: ${e.message}` });
    }
  };
</script>
</body>
</html>

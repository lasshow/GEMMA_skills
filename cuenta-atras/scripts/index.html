<!doctype html>
<html lang="es">
<head><meta charset="UTF-8" /><title>Cuenta Atras</title></head>
<body>
<script>
  window['ai_edge_gallery_get_result'] = async (data) => {
    try {
      const jsonData = JSON.parse(data);
      const action = jsonData.action || 'countdown';
      const event = jsonData.event || 'el evento';

      if (action === 'between') {
        const d1 = new Date(jsonData.date);
        const d2 = new Date(jsonData.date2);
        if (isNaN(d1) || isNaN(d2)) return JSON.stringify({ error: 'Fechas no validas.' });
        const diff = Math.abs(d2 - d1);
        const days = Math.floor(diff / 86400000);
        const weeks = Math.floor(days / 7);
        const months = Math.floor(days / 30.44);
        return JSON.stringify({
          result: `=== ENTRE FECHAS ===\n\n${jsonData.date} <-> ${jsonData.date2}\n\n${days} dias (${weeks} semanas, ~${months} meses)`
        });
      }

      const target = new Date(jsonData.date + 'T00:00:00');
      if (isNaN(target)) return JSON.stringify({ error: 'Fecha no valida. Usa formato YYYY-MM-DD.' });

      const now = new Date();
      const diff = target - now;
      const absDiff = Math.abs(diff);

      const days = Math.floor(absDiff / 86400000);
      const hours = Math.floor((absDiff % 86400000) / 3600000);
      const minutes = Math.floor((absDiff % 3600000) / 60000);
      const weeks = Math.floor(days / 7);

      const targetStr = target.toLocaleDateString('es-ES', { weekday: 'long', day: 'numeric', month: 'long', year: 'numeric' });

      let result = `=== CUENTA ATRAS ===\n\n`;
      result += `Evento: ${event}\n`;
      result += `Fecha: ${targetStr}\n\n`;

      if (diff > 0) {
        result += `Faltan: ${days} dias, ${hours} horas y ${minutes} minutos\n`;
        if (days > 7) result += `(${weeks} semanas y ${days % 7} dias)`;
      } else if (diff < 0) {
        result += `Hace: ${days} dias, ${hours} horas y ${minutes} minutos\n`;
        result += `(ya paso)`;
      } else {
        result += `ES HOY!`;
      }

      return JSON.stringify({ result });
    } catch (e) {
      return JSON.stringify({ error: `Error: ${e.message}` });
    }
  };
</script>
</body>
</html>

<!doctype html>
<html lang="es">
<head><meta charset="UTF-8" /><title>Resumir Pagina</title></head>
<body>
<script>
  async function fetchPage(url) {
    try { const r = await fetch(url); if (r.ok) return await r.text(); } catch(e) {}
    try { const r = await fetch(`https://corsproxy.io/?url=${encodeURIComponent(url)}`); if (r.ok) return await r.text(); } catch(e) {}
    try { const r = await fetch(`https://proxy.corsfix.com/?${encodeURIComponent(url)}`); if (r.ok) return await r.text(); } catch(e) {}
    throw new Error('No se pudo acceder');
  }

  function extractText(html) {
    const doc = new DOMParser().parseFromString(html, 'text/html');
    ['script','style','nav','footer','header','aside','noscript','svg','iframe','form']
      .forEach(tag => doc.querySelectorAll(tag).forEach(el => el.remove()));
    let main = null;
    for (const s of ['article','main','[role="main"]','.post-content','.article-body','.entry-content','.content','#content']) {
      main = doc.querySelector(s); if (main) break;
    }
    const title = doc.querySelector('title')?.textContent?.trim() || doc.querySelector('h1')?.textContent?.trim() || '';
    const desc = doc.querySelector('meta[name="description"]')?.getAttribute('content') || '';
    const el = main || doc.body;
    let text = '';
    el.querySelectorAll('p, h1, h2, h3, h4, li, blockquote, pre').forEach(n => {
      const t = n.textContent.replace(/\s+/g, ' ').trim();
      if (t.length > 15) {
        if (n.tagName.toLowerCase().startsWith('h')) text += `\n## ${t}\n`;
        else if (n.tagName.toLowerCase() === 'li') text += `- ${t}\n`;
        else text += t + '\n\n';
      }
    });
    if (!text.trim()) text = el.textContent.replace(/\s+/g, ' ').trim();
    return { title, desc, text };
  }

  window['ai_edge_gallery_get_result'] = async (data) => {
    try {
      const jsonData = JSON.parse(data);
      let url = jsonData.url || '';
      if (!url) return JSON.stringify({ error: 'No se proporciono URL.' });
      if (!url.startsWith('http')) url = 'https://' + url;

      let html;
      try { html = await fetchPage(url); }
      catch(e) { return JSON.stringify({ result: `No se pudo acceder a ${url}.\nAbre tu navegador y visita la URL directamente.` }); }

      const { title, desc, text } = extractText(html);
      let result = '';
      if (title) result += `--- TITULO ---\n${title}\n\n`;
      if (desc) result += `--- DESCRIPCION ---\n${desc}\n\n`;
      result += `--- CONTENIDO ---\n${text.trim() || 'No se pudo extraer texto.'}`;
      if (result.length > 5000) result = result.substring(0, 5000) + '\n\n[TRUNCADO]';
      return JSON.stringify({ title, url, result });
    } catch (e) {
      return JSON.stringify({ error: `Error: ${e.message}` });
    }
  };
</script>
</body>
</html>
